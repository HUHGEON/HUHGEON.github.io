title: HUHGEON's Blog
description: "기록하고 공유하는 개발 블로그"
logo_img: "/assets/img/favicon.svg"
profile_img: "/assets/img/me.jpg"

# 작성자(오너) 정보 — byline / 댓글 본인 아바타 등에 사용
author: HUHGEON
prompt_user: huhgeon          # 사이드바 터미널 프롬프트 huhgeon@blog:~$
default_thumbnail: "/assets/img/default-thumb.jpg"   # 썸네일 없을 때 기본 이미지

# 글쓰기 에디터(admin) → GitHub 자동 커밋/푸시 대상
github_repo: "HUHGEON/HUHGEON.github.io"
github_branch: "master"

# GitHub 로그인(OAuth) 브로커 — Cloudflare Worker 배포 후 그 주소를 넣으세요.
# 비워두면 자동으로 PAT(토큰 붙여넣기) 방식으로 대체됩니다.
# 예) https://hg-oauth.<your-subdomain>.workers.dev
oauth_url: "https://hg-oauth.rjs2337.workers.dev"

# Social Links (필요 없는 항목은 빈칸으로 두면 표시되지 않습니다)
email: dbgmlwns@hs.ac.kr
github_username: HUHGEON
twitter_username:
instagram_username:
linkedin_username:
facebook_username:

# 댓글은 워커 KV(커스텀)로 처리 — giscus 미사용
goatcounter_code:
google_analytics:

# If your repo name follows the format "<user-name>.github.io", then leave the below blank.
# Otherwise, set its value as "/<repo-name>". ex) baseurl: /myblog
baseurl:

# 사이트 주소 (검색엔진 노출/sitemap/SEO에 필수)
url: "https://huhgeon.github.io"

# 날짜/시간 표시 기준 시간대
timezone: Asia/Seoul

# Build settings
plugins:
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-loading-lazy

exclude:
  - docs/
  - design_handoff_huhgeon_blog/
  - oauth-worker/
  - README.md

collections:
  pages:
    output: true
    permalink: /:path.html

defaults:
  -
    scope:
      path: ""
      type: "pages"
    values:
      layout: "page"
      date: "1900-01-01"

# Markdown newline activator 
kramdown:
  input: GFM
  hard_wrap: true
