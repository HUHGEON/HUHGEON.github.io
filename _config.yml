title: HUHGEON's Blog
description: "기록하고 공유하는 개발 블로그"
logo_img: "/assets/img/favicon.webp"
profile_img: "/assets/img/profile.webp"

# Social Links (필요 없는 항목은 빈칸으로 두면 표시되지 않습니다)
email: dbgmlwns@hs.ac.kr
github_username: HUHGEON
twitter_username:
instagram_username:
linkedin_username:
facebook_username:

# External API (giscus 댓글은 나중에 본인 저장소로 설정 — docs/Comment System.md 참고)
giscus_repo:
giscus_repoId:
giscus_category:
giscus_categoryId:
goatcounter_code:
google_analytics:

# If your repo name follows the format "<user-name>.github.io", then leave the below blank.
# Otherwise, set its value as "/<repo-name>". ex) baseurl: /myblog
baseurl:

# Build settings
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-loading-lazy

exclude:
  - docs/

collections:
  pages:
    output: true
    permalink: /:path.html

defaults:
  -
    scope:
      path: ""
      type: "pages"
    values:
      layout: "page"
      date: "1900-01-01"

# Markdown newline activator 
kramdown:
  input: GFM
  hard_wrap: true
