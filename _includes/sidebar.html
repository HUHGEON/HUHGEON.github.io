<aside class="sidebar" id="sidebar">
    <div class="sb-head">
        <div class="sb-prompt"><b>{{ site.prompt_user | default: "huhgeon" }}</b>@blog<span class="dim">:</span><span class="tilde">~</span>$<span class="cursor"></span></div>
        <a class="sb-id" href="{{ site.baseurl | append: '/' }}" aria-label="홈으로">
            <span class="sb-ava"><img src="{{ site.profile_img | prepend: site.baseurl }}" alt="profile"></span>
            <div>
                <div class="sb-name">{{ site.title }}</div>
                <div class="sb-desc">{{ site.description }}</div>
            </div>
        </a>
    </div>

    <a class="sb-write" href="{{ '/admin.html#write' | prepend: site.baseurl }}">
        <svg viewBox="0 0 512 512"><path d="M362.7 19.3L314.3 67.7 444.3 197.7l48.4-48.4c25-25 25-65.5 0-90.5L453.3 19.3c-25-25-65.5-25-90.5 0zm-71 71L58.6 323.5c-10.4 10.4-18 23.3-22.2 37.4L1 481.2C-1.5 489.7 .8 498.8 7 505s15.3 8.5 23.7 6.1l120.3-35.4c14.1-4.2 27-11.8 37.4-22.2L421.7 220.3 291.7 90.3z"/></svg>
        새 글 쓰기
    </a>
    <a class="sb-manage" href="{{ '/admin.html#manage' | prepend: site.baseurl }}">
        <svg viewBox="0 0 512 512"><path d="M495 280c8.6-7.2 13-18.2 11.5-29.3-1.2-9.2-2.9-18.2-5.1-27l-23.2 4.7c-9.7-37.9-32-71-62.2-94.6l13.1-19.8c-7-6.1-14.5-11.7-22.4-16.7l-13.1 19.8c-33.3-18.9-72.5-27.2-111.5-22.7l-2.7-23.7c-9 1-17.9 2.7-26.6 4.9l5.5 23.3c-37.7 9.9-70.6 32.4-94 63l-19.5-13.4c-6 7.1-11.5 14.7-16.4 22.6l19.8 12.6c-18.5 33.3-26.6 72.2-22.2 110.9l-23.7 2.6c1 9 2.7 17.9 5 26.6l23.3-5.4c9.7 37.7 32.2 70.7 62.8 94.1l-13.4 19.6c7 6 14.5 11.6 22.4 16.5l13-19.7c33.4 18.7 72.6 26.8 111.6 22.2l2.7 23.7c8.9-1 17.8-2.7 26.5-4.9l-5.5-23.4c37.6-9.9 70.4-32.3 93.8-62.7l19.7 13.5c6-7 11.6-14.5 16.5-22.4l-19.7-13zM256 336a80 80 0 1 1 0-160 80 80 0 1 1 0 160z"/></svg>
        카테고리·태그 관리
    </a>

    <nav class="nav">
        <div class="nav-label">~/ 탐색</div>
        <a class="nav-item" id="nav-recent" href="{{ site.baseurl | append: '/' }}">
            <span class="ico"><svg viewBox="0 0 24 24"><path d="M3 11l9-8 9 8M5 10v10h14V10"></path></svg></span>
            최신글
        </a>
        <a class="nav-item" id="nav-all-posts" href="{{ '/#all' | prepend: site.baseurl }}">
            <span class="ico"><svg viewBox="0 0 24 24"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"></path></svg></span>
            전체글 <span class="badge" id="all-count">0</span>
        </a>

        <div class="nav-label">~/ 카테고리</div>
        <div id="nav-cats"></div>

        <div class="nav-label">~/ 인기 태그</div>
        <div class="nav-tags" id="nav-tags"></div>
    </nav>

    <div class="sb-foot">
        <span class="owner-flag mono">● owner mode</span>
        {% if site.goatcounter_code or site.oauth_url != "" %}
        <span>총 방문 <b id="site-hits"{% if site.goatcounter_code %} data-gc="{{ site.goatcounter_code }}"{% endif %}>—</b></span>
        {% endif %}
        <span>© 2026 {{ site.author | default: "HUHGEON" }} · built with Jekyll</span>
    </div>
</aside>
